name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src/poster-gen
            src/seek-preview

      - name: Install FFmpeg 7.x dev libs
        run: |
          sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
          sudo apt-get update
          sudo apt-get install -y pkg-config clang libavcodec-dev libavformat-dev libavutil-dev libswscale-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            src/frontend/package-lock.json
            src/player-enhancer/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Install enhancer dependencies
        working-directory: src/player-enhancer
        run: npm ci

      - name: Test Rust
        run: make test-rust

      - name: Test frontend
        run: make test-frontend

      - name: Test C#
        run: make test-csharp

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Build enhancer
        working-directory: src/player-enhancer
        run: npm run build

      - name: Build plugin
        run: dotnet build src/JellyfinSuite.Plugin/JellyfinSuite.Plugin.csproj -c Release
