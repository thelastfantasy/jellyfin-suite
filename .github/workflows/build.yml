name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/poster-gen

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Test Rust
        run: make test-rust

      - name: Test frontend
        run: make test-frontend

      - name: Test C#
        run: make test-csharp

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Build plugin
        run: dotnet build src/JellyfinRecents.Plugin/JellyfinRecents.Plugin.csproj -c Release
